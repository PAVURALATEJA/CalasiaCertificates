{% extends "base.html" %}
{% block title %}Setup Admin — Cal-Asia{% endblock %}

{% block nocontent %}
<div class="full-page">
  <div style="width:100%;max-width:400px;padding:20px;">
    <div class="card-glass">
      <h5 style="font-weight:700;margin-bottom:6px;"><i class="bi bi-gear-fill me-2" style="color:#f97316;"></i>Admin Password Setup</h5>
      <p style="font-size:13px;color:#8892a4;margin-bottom:20px;">Set the administrator password for first-time login.</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required/>
        </div>
        <button type="submit" class="btn btn-orange w-100"><i class="bi bi-save me-2"></i>Set Password & Login</button>
      </form>
      <div class="mt-3 text-center">
        <a href="{{ url_for('login') }}" style="color:#8892a4;font-size:12px;">← Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
