{% extends "base.html" %}
{% block title %}Error {{ code }} — Cal-Asia{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;">
  <div style="font-size:80px;font-weight:800;color:#1e2d50;">{{ code }}</div>
  <h2 style="margin:0 0 8px;">{{ 'Access Denied' if code==403 else 'Page Not Found' }}</h2>
  <p style="color:#8892a4;margin-bottom:24px;">{{ msg }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-orange"><i class="bi bi-arrow-left me-2"></i>Go Home</a>
</div>
{% endblock %}
