{% extends "base.html" %}
{% block title %}Change Password — Cal-Asia{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title"><i class="bi bi-shield-lock me-2" style="color:#10b981;"></i>Change Password</h1>
  <p class="page-sub">Update your login password below</p>
</div>

<div class="row">
  <div class="col-lg-5">
    <form method="POST">
      <div class="card-glass">
        <div class="mb-3">
          <label class="form-label">Current Password <span style="color:#ef4444;">*</span></label>
          <input type="password" name="current_password" id="current_password"
                 class="form-control" required autocomplete="current-password"/>
        </div>
        <div class="mb-3">
          <label class="form-label">New Password <span style="color:#ef4444;">*</span></label>
          <input type="password" name="new_password" id="new_password"
                 class="form-control" required minlength="6" autocomplete="new-password"/>
          <div style="font-size:11px;color:#8892a4;margin-top:4px;">Minimum 6 characters</div>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm New Password <span style="color:#ef4444;">*</span></label>
          <input type="password" name="confirm_password" id="confirm_password"
                 class="form-control" required minlength="6" autocomplete="new-password"/>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-orange" id="btn-change-pw">
            <i class="bi bi-check-circle me-1"></i>Update Password
          </button>
          <a href="{{ url_for('customer_dashboard') }}" class="btn btn-glass">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
